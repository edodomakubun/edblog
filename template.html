<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel | Dev Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Memaksa gambar di dalam artikel agar tidak raksasa */
        .prose img { max-width: 100%; height: auto; border-radius: 0.75rem; margin-top: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .prose h2 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; margin-top: 2rem; color: #0f172a; }
        .prose p { margin-bottom: 1.25rem; line-height: 1.8; color: #334155; font-size: 1.125rem; }
    </style>
</head>
<body class="bg-slate-50 antialiased min-h-screen flex flex-col font-sans">
    
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 py-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
            <a href="/" class="text-2xl font-extrabold text-slate-800">Dev<span class="text-blue-600">Blog</span></a>
            <div class="flex flex-wrap items-center gap-4">
                <a href="/" class="text-sm font-semibold text-slate-600 hover:text-blue-600 transition">Beranda</a>
                <a href="/halaman/profil.html" class="text-sm font-semibold text-slate-600 hover:text-blue-600 transition">Profil</a>
                <a href="/halaman/kontak.html" class="text-sm font-semibold text-slate-600 hover:text-blue-600 transition">Kontak</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        <div class="max-w-6xl mx-auto px-6 py-16 lg:grid lg:grid-cols-[1fr_300px] lg:gap-8">
            <article class="bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-slate-200 prose">
                {{CONTENT}}
            </article>

            <aside class="lg:sticky lg:top-28 space-y-6 self-start mt-10 lg:mt-0">
                {{SIDEBAR}}
            </aside>
        </div>
    </main>

    <footer class="mt-auto py-8 text-center text-sm text-slate-500 bg-white border-t">
        <p><a href="/" class="text-blue-500 font-semibold hover:underline">&larr; Kembali ke Beranda</a></p>
    </footer>

</body>
</html>
