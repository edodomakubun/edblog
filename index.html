<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda | Dev Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi Kustom */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
    </style>
</head>
<body class="bg-slate-50 antialiased min-h-screen flex flex-col font-sans relative overflow-x-hidden">
    
    <div class="absolute top-0 left-0 w-full h-[500px] bg-gradient-to-br from-blue-50 via-purple-50 to-white -z-10 [clip-path:polygon(0_0,100%_0,100%_80%,0_100%)]"></div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-white/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] transition-all duration-300">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-extrabold tracking-tight text-slate-800 hover:scale-105 transition-transform">Dev<span class="text-blue-600">Blog</span></a>
            <div class="flex items-center space-x-6 text-sm font-semibold text-slate-600">
                <a href="/" class="hover:text-blue-600 transition-colors">Beranda</a>
                <a href="https://github.com" target="_blank" class="px-5 py-2.5 bg-slate-900 text-white rounded-full hover:bg-blue-600 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300">GitHub Saya</a>
            </div>
        </div>
    </nav>
    <header class="max-w-5xl mx-auto px-6 pt-20 pb-16 text-center opacity-0 animate-fade-in-up">

        <h1 class="text-4xl md:text-6xl font-extrabold text-slate-900 mb-6 tracking-tight leading-tight">Eksplorasi Kode <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">& Desain Modern</span></h1>
        <p class="text-lg md:text-xl text-slate-600 max-w-2xl mx-auto font-medium">Catatan pengembangan, tutorial, dan ide-ide kreatif seputar teknologi web modern yang diracik menjadi satu.</p>
    </header>

    <main class="flex-grow w-full max-w-5xl mx-auto px-6 pb-20 opacity-0 animate-fade-in-up delay-200 overflow-x-hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="grid-artikel">
            
            </div>
    </main>

    <footer class="py-8 text-center text-sm font-medium text-slate-400 border-t border-slate-200 bg-white/50 backdrop-blur-sm">
        <p>&copy;2026 Edward Domakubun. All rights reserved..</p>

</body>
